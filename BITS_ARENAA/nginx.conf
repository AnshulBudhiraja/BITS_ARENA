upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name localhost; 

    # Serve Django static files directly from the mounted volume
    location /static/ {
        alias /app/staticfiles/;
    }
    location /media/ {
        alias /app/media/;
    }
    # Pass all other requests to the Django container
    location / {
        proxy_pass http://django;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }
}
